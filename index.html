<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input {
  width: 70%;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.card {
  background: #1e293b;
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
}

.city {
  font-size: 18px;
  color: #38bdf8;
  margin-bottom: 10px;
}

.library {
  margin-left: 10px;
  color: #fbbf24;
  margin-top: 10px;
}

.item {
  display: flex;
  gap: 10px;
  margin-left: 20px;
  margin-top: 10px;
  align-items: center;
}

.item img {
  width: 60px;
  height: 80px;
  border-radius: 6px;
}
</style>

<div class="container">

  <input type="text" id="search" placeholder="اكتب اسم الكتاب">
  <button onclick="searchBook()">بحث</button>

  <div id="results"></div>

</div>

<script>
function searchBook() {
  let q = document.getElementById("search").value;

  fetch("http://127.0.0.1:5000/search?q=" + q)
    .then(res => res.json())
    .then(data => {

      let grouped = {};

      data.forEach(r => {
        if (!grouped[r.city]) grouped[r.city] = {};
        if (!grouped[r.city][r.library]) grouped[r.city][r.library] = [];
        grouped[r.city][r.library].push(r);
      });

      let html = "";

      for (let city in grouped) {

        html += `<div class="card">`;
        html += `<div class="city">📍 ${city}</div>`;

        for (let lib in grouped[city]) {

          html += `<div class="library">🏛 ${lib}</div>`;

          grouped[city][lib].forEach(item => {

            html += `
              <div class="item">
                <img src="${item.cover_image}">
                <div>
                  <div>📘 ${item.publisher}</div>
                  <div>💰 ${item.price}</div>
                </div>
              </div>
            `;
          });

        }

        html += `</div>`;
      }

      document.getElementById("results").innerHTML = html;

    })
    .catch(() => {
      document.getElementById("results").innerHTML = "خطأ بالاتصال";
    });
}
</script>
